{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">Register New Member</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="number" class="form-control" name="phone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                
                    <div class="mb-3">
                        <label class="form-label">Register As</label>
                        <select class="form-select" name="role" id="roleSelect" onchange="toggleAdminKey()">
                            <option value="member">Library Member</option>
                            <option value="admin">Librarian / Admin</option>
                        </select>
                    </div>
                
                    <div class="mb-3" id="adminKeyField" style="display: none;">
                        <label class="form-label text-danger">Admin Secret Key</label>
                        <input type="password" class="form-control" name="admin_key" placeholder="Required for Admin registration">
                    </div>
                
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <script>
                    function toggleAdminKey() {
                        var role = document.getElementById("roleSelect").value;
                        var keyField = document.getElementById("adminKeyField");
                        if (role === "admin") {
                            keyField.style.display = "block";
                        } else {
                            keyField.style.display = "none";
                        }
                    }
                </script>
            </div>
        </div>
    </div>
</div>
{% endblock %}
